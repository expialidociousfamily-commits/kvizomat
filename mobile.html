<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kvízomat — Odpovídač</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #070b14; color: #fff;
      font-family: 'Nunito', sans-serif; overflow: hidden;
    }
    #app {
      height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
      gap: 16px;
    }
    .title { font-size: 1.4rem; font-weight: 900; color: #f5c518; letter-spacing: 1px; }
    .subtitle { font-size: 1rem; color: #8899aa; text-align: center; }
    .profile-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 360px;
    }
    .profile-btn {
      background: #111827; border: 2px solid #1e2d45; border-radius: 16px;
      padding: 20px 10px; display: flex; flex-direction: column;
      align-items: center; gap: 8px; cursor: pointer;
      font-family: 'Nunito', sans-serif; color: #fff;
      font-size: 1.2rem; font-weight: 800; transition: transform 0.1s, border-color 0.2s;
      min-height: 80px;
    }
    .profile-btn:active { transform: scale(0.95); }
    .profile-btn .emoji { font-size: 2rem; }
    .answer-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 400px;
    }
    .answer-btn {
      border: none; border-radius: 16px; padding: 0 16px;
      min-height: 90px; display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif; color: #fff;
      font-size: 1.5rem; font-weight: 900; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s; text-align: center;
    }
    .answer-btn:active { transform: scale(0.95); }
    .answer-btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .status-card {
      background: #111827; border: 2px solid #1e2d45; border-radius: 20px;
      padding: 32px 24px; text-align: center; width: 100%; max-width: 400px;
    }
    .status-icon { font-size: 3rem; margin-bottom: 12px; }
    .status-text { font-size: 1.3rem; font-weight: 700; }
    .status-sub { font-size: 0.95rem; color: #8899aa; margin-top: 8px; }
    .player-badge {
      background: #1e2d45; border-radius: 12px; padding: 10px 20px;
      font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 8px;
    }
    .change-btn {
      background: transparent; border: 1px solid #1e2d45; border-radius: 10px;
      color: #8899aa; font-family: 'Nunito', sans-serif;
      font-size: 0.85rem; padding: 6px 14px; cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const PROFILES = [
  { id: 'tata',   name: 'Táta',   emoji: '👨' },
  { id: 'mama',   name: 'Máma',   emoji: '👩' },
  { id: 'mia',    name: 'Mia',    emoji: '👧' },
  { id: 'centik', name: 'Centík', emoji: '👦' },
  { id: 'host',   name: 'Host',   emoji: '🙂' },
]
const OPTION_COLORS = { A: '#e74c3c', B: '#3498db', C: '#f39c12', D: '#27ae60' }

let myProfile = null
try { myProfile = JSON.parse(localStorage.getItem('kviz_mobile_profile')) } catch {}
let gameState = { phase: 'waiting', question: null, answers: {} }
let myAnswer = null

// Připojíme se na stejný server co servíruje tuto stránku (funguje lokálně i na Railway)
const SOCKET_URL = window.SOCKET_URL || window.location.origin
const socket = io(SOCKET_URL)

socket.on('game-state', (state) => {
  const prevQId = gameState.question?.id
  gameState = state
  if (state.question?.id !== prevQId) myAnswer = null
  if (state.phase === 'waiting') myAnswer = null
  render()
})

socket.on('answer-received', ({ profileId }) => {
  if (myProfile && profileId === myProfile.id) {
    myAnswer = gameState.answers[profileId]
    render()
  }
})

function selectProfile(profile) {
  myProfile = profile
  localStorage.setItem('kviz_mobile_profile', JSON.stringify(profile))
  myAnswer = null
  render()
}

function submitAnswer(option) {
  if (!myProfile || myAnswer) return
  myAnswer = option
  socket.emit('submit-answer', { profileId: myProfile.id, answer: option })
  render()
}

function render() {
  const app = document.getElementById('app')

  if (!myProfile) {
    app.innerHTML = `
      <div class="title">🎯 KVÍZOMAT</div>
      <div class="subtitle">Vyber svůj profil</div>
      <div class="profile-grid">
        ${PROFILES.map(p => `
          <button class="profile-btn" onclick="selectProfile(${JSON.stringify(p).replace(/"/g, '&quot;')})">
            <span class="emoji">${p.emoji}</span>
            <span>${p.name}</span>
          </button>
        `).join('')}
      </div>
    `
    return
  }

  const alreadyInAnswers = gameState.answers?.[myProfile.id]
  const effectiveAnswer = myAnswer || alreadyInAnswers || null

  let content = ''

  if (gameState.phase === 'question' && gameState.question && !effectiveAnswer) {
    const opts = gameState.question.options || {}
    content = `
      <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
      <div class="subtitle" style="font-size:1rem;color:#f5c518;font-weight:700">Vyber odpověď!</div>
      <div class="answer-grid">
        ${Object.entries(opts).map(([key, val]) => `
          <button class="answer-btn" style="background:${OPTION_COLORS[key]}" onclick="submitAnswer('${key}')">
            <span style="font-size:1.8rem;margin-right:6px">${key}</span>
            <span style="font-size:1rem;font-weight:700">${val}</span>
          </button>
        `).join('')}
      </div>
    `
  } else if (effectiveAnswer) {
    content = `
      <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
      <div class="status-card">
        <div class="status-icon">✅</div>
        <div class="status-text">Tvá odpověď: <span style="color:${OPTION_COLORS[effectiveAnswer]}">${effectiveAnswer}</span></div>
        <div class="status-sub">Čekáme na ostatní...</div>
      </div>
    `
  } else {
    content = `
      <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
      <div class="status-card">
        <div class="status-icon">⏳</div>
        <div class="status-text">Čekáme na otázku...</div>
        <div class="status-sub">Připravte se!</div>
      </div>
      <button class="change-btn" onclick="myProfile=null;render()">Změnit hráče</button>
    `
  }

  app.innerHTML = content
}

render()
</script>
</body>
</html>
