<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Kvízomat — Odpovídač</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; background: #070b14; color: #fff;
      font-family: 'Nunito', sans-serif; overflow: hidden;
    }
    #app {
      height: 100dvh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; padding: 20px;
      gap: 14px; overflow-y: auto;
    }
    .title { font-size: 1.4rem; font-weight: 900; color: #f5c518; letter-spacing: 1px; }
    .subtitle { font-size: 1rem; color: #8899aa; text-align: center; }
    .profile-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 360px;
    }
    .profile-btn {
      background: #111827; border: 2px solid #1e2d45; border-radius: 16px;
      padding: 20px 10px; display: flex; flex-direction: column;
      align-items: center; gap: 8px; cursor: pointer;
      font-family: 'Nunito', sans-serif; color: #fff;
      font-size: 1.2rem; font-weight: 800; transition: transform 0.1s, border-color 0.2s;
      min-height: 80px;
    }
    .profile-btn:active { transform: scale(0.95); }
    .profile-btn .emoji { font-size: 2rem; }

    /* MC answer buttons */
    .answer-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 14px; width: 100%; max-width: 400px;
    }
    .answer-btn {
      border: none; border-radius: 16px; padding: 0 16px;
      min-height: 90px; display: flex; align-items: center; justify-content: center;
      font-family: 'Nunito', sans-serif; color: #fff;
      font-size: 1.5rem; font-weight: 900; cursor: pointer;
      transition: transform 0.1s, opacity 0.2s; text-align: center;
    }
    .answer-btn:active { transform: scale(0.95); }
    .answer-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    /* AN answer layout */
    .an-wrapper {
      width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px;
    }
    .an-list {
      display: flex; flex-direction: column; gap: 8px;
      overflow-y: auto; max-height: 52vh;
    }
    .an-item {
      background: #111827; border: 1.5px solid #1e2d45; border-radius: 14px;
      padding: 12px 14px;
    }
    .an-question { font-size: 0.92rem; font-weight: 700; margin-bottom: 8px; color: #d0dae8; line-height: 1.4; }
    .an-btns { display: flex; gap: 8px; }
    .an-btn {
      flex: 1; height: 44px; border-radius: 10px; border: 2px solid #1e2d45;
      background: transparent; color: #8899aa; font-family: 'Nunito', sans-serif;
      font-size: 1rem; font-weight: 900; cursor: pointer; transition: all 0.15s;
    }
    .an-btn:active { transform: scale(0.95); }
    .an-btn.sel-yes { border-color: #27ae60; background: rgba(39,174,96,0.2); color: #27ae60; }
    .an-btn.sel-no  { border-color: #e74c3c; background: rgba(231,76,60,0.2);  color: #e74c3c; }
    .progress-badge {
      font-size: 1rem; color: #f5c518; font-weight: 800; text-align: center;
    }
    .submit-btn {
      width: 100%; background: #f5c518; color: #000;
      border: none; border-radius: 14px; padding: 16px;
      font-family: 'Nunito', sans-serif; font-size: 1.15rem; font-weight: 900;
      cursor: pointer; transition: opacity 0.2s;
    }
    .submit-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    /* Match type */
    .match-item {
      background: #111827; border: 1.5px solid #1e2d45; border-radius: 12px;
      padding: 12px; margin: 8px 0;
    }
    .match-label { font-size: 0.95rem; font-weight: 700; color: #d0dae8; margin-bottom: 10px; line-height: 1.35; }
    .match-opts { display: flex; gap: 6px; }
    .match-opt-btn {
      flex: 1; height: 44px; border-radius: 8px; border: 2px solid transparent;
      font-family: 'Nunito', sans-serif; font-size: 1rem; font-weight: 900;
      cursor: pointer; transition: all 0.12s; opacity: 0.5; color: #fff;
    }
    .match-opt-btn:active { transform: scale(0.95); }
    .match-opt-btn.selected { border: 3px solid #fff; opacity: 1; }

    /* Status / waiting card */
    .status-card {
      background: #111827; border: 2px solid #1e2d45; border-radius: 20px;
      padding: 32px 24px; text-align: center; width: 100%; max-width: 400px;
    }
    .status-icon { font-size: 3rem; margin-bottom: 12px; }
    .status-text { font-size: 1.3rem; font-weight: 700; }
    .status-sub { font-size: 0.95rem; color: #8899aa; margin-top: 8px; }
    .player-badge {
      background: #1e2d45; border-radius: 12px; padding: 10px 20px;
      font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 8px;
    }
    .change-btn {
      background: transparent; border: 1px solid #1e2d45; border-radius: 10px;
      color: #8899aa; font-family: 'Nunito', sans-serif;
      font-size: 0.85rem; padding: 6px 14px; cursor: pointer; margin-top: 8px;
    }
  </style>
</head>
<body>
<div id="app"></div>

<script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
<script>
const PROFILES = [
  { id: 'tata',   name: 'Táta',   emoji: '👨' },
  { id: 'mama',   name: 'Máma',   emoji: '👩' },
  { id: 'mia',    name: 'Mia',    emoji: '👧' },
  { id: 'centik', name: 'Centík', emoji: '🦖' },
  { id: 'host',   name: 'Host',   emoji: '🙂' },
]
const OPTION_COLORS = { A: '#e74c3c', B: '#3498db', C: '#f39c12', D: '#27ae60', E: '#9b59b6' }

let myProfile = null
try { myProfile = JSON.parse(localStorage.getItem('kviz_mobile_profile')) } catch {}
let gameState = { phase: 'waiting', question: null, answers: {} }
let myAnswer = null
let myAnAnswers = {}
let myMatchAnswers = {}
let submitted = false

const SOCKET_URL = 'https://kvizomat-production.up.railway.app'
const socket = io(SOCKET_URL)

function resetMobileUI() {
  submitted = false
  myAnswer = null
  myAnAnswers = {}
  myMatchAnswers = {}
  if (!myProfile) { render(); return }
  document.getElementById('app').innerHTML = `
    <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
    <div class="status-card">
      <div class="status-icon">⏳</div>
      <div class="status-text">Čekáme na další otázku...</div>
      <div class="status-sub">Připravte se na nové kolo!</div>
    </div>
    <button class="change-btn" onclick="myProfile=null;render()">Změnit hráče</button>
  `
}

socket.on('round-ended', () => {
  resetMobileUI()
})

socket.on('game-state', (state) => {
  const prevQId = gameState.question?.id
  gameState = state
  if (state.question?.id !== prevQId) { submitted = false; myAnswer = null; myAnAnswers = {}; myMatchAnswers = {} }
  if (state.phase === 'waiting') {
    resetMobileUI()
    return
  }
  if (!submitted) render()
})

socket.on('answer-received', () => {})

function selectProfile(profile) {
  myProfile = profile
  localStorage.setItem('kviz_mobile_profile', JSON.stringify(profile))
  myAnswer = null
  myAnAnswers = {}
  myMatchAnswers = {}
  render()
}

function buildAnswerSummary(answer) {
  const qType = gameState.question?.type || 'mc'
  const subitems = gameState.question?.subitems || []
  if (typeof answer === 'object' && answer !== null) {
    if (qType === 'match') {
      return `<div style="margin-top:12px;display:flex;flex-direction:column;gap:5px;align-items:flex-start;padding:0 8px">
        ${subitems.map((si, idx) => {
          const opt = answer[si.id]
          return `<div style="display:flex;align-items:center;gap:8px;font-size:0.88rem">
            <span style="color:#8899aa">${idx + 1}.</span>
            <span style="color:#d0dae8;font-weight:600;flex:1">${si.question}</span>
            <span style="background:${OPTION_COLORS[opt] || '#555'};color:#fff;border-radius:6px;padding:2px 10px;font-weight:900">${opt}</span>
          </div>`
        }).join('')}
      </div>`
    } else {
      return `<div style="margin-top:12px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
        ${subitems.map((si, idx) => `
          <div style="background:#1e2d45;border-radius:8px;padding:4px 10px;font-size:0.9rem;font-weight:800;color:${answer[si.id] === 'A' ? '#27ae60' : '#e74c3c'}">
            ${idx + 1}. ${answer[si.id] === 'A' ? 'ANO' : 'NE'}
          </div>
        `).join('')}
      </div>`
    }
  }
  return `<div style="margin-top:10px;font-size:2rem;font-weight:900;color:${OPTION_COLORS[answer] || '#fff'}">${answer}</div>`
}

function showConfirmation(answer) {
  document.getElementById('app').innerHTML = `
    <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
    <div class="status-card">
      <div class="status-icon">✅</div>
      <div class="status-text">Odesláno!</div>
      ${buildAnswerSummary(answer)}
      <div class="status-sub" style="margin-top:14px">Čekáme na ostatní...</div>
    </div>
  `
}

function submitMcAnswer(option) {
  if (!myProfile || submitted) return
  submitted = true
  myAnswer = option
  socket.emit('submit-answer', { profileId: myProfile.id, answer: option })
  showConfirmation(option)
}

function selectAnAnswer(subitemId, option) {
  if (submitted) return
  myAnAnswers[subitemId] = option
  render()
}

function submitAnAnswer() {
  if (!myProfile || submitted) return
  const subitems = gameState.question?.subitems || []
  if (!subitems.every(si => myAnAnswers[si.id])) return
  submitted = true
  myAnswer = { ...myAnAnswers }
  socket.emit('submit-answer', { profileId: myProfile.id, answer: myAnswer })
  showConfirmation(myAnswer)
}

function selectMatchAnswer(subitemId, option) {
  if (submitted) return
  myMatchAnswers[subitemId] = option
  render()
}

function submitMatchAnswer() {
  if (!myProfile || submitted) return
  const subitems = gameState.question?.subitems || []
  if (!subitems.every(si => myMatchAnswers[si.id])) return
  submitted = true
  myAnswer = { ...myMatchAnswers }
  socket.emit('submit-answer', { profileId: myProfile.id, answer: myAnswer })
  showConfirmation(myAnswer)
}

function render() {
  const app = document.getElementById('app')

  if (!myProfile) {
    app.innerHTML = `
      <div class="title">🎯 KVÍZOMAT</div>
      <div class="subtitle">Vyber svůj profil</div>
      <div class="profile-grid">
        ${PROFILES.map(p => `
          <button class="profile-btn" onclick="selectProfile(${JSON.stringify(p).replace(/"/g, '&quot;')})">
            <span class="emoji">${p.emoji}</span>
            <span>${p.name}</span>
          </button>
        `).join('')}
      </div>
    `
    return
  }

  const alreadyInAnswers = gameState.answers?.[myProfile.id]
  const effectiveAnswer = myAnswer !== null ? myAnswer : (alreadyInAnswers || null)
  const qType = gameState.question?.type || 'mc'

  let content = ''

  if (gameState.phase === 'question' && gameState.question && !effectiveAnswer) {

    if (qType === 'match') {
      const subitems = gameState.question.subitems || []
      const opts = gameState.question.options || {}
      const totalCount = subitems.length
      const answeredCount = subitems.filter(si => myMatchAnswers[si.id]).length
      const allDone = answeredCount === totalCount

      content = `
        <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
        <div class="an-wrapper">
          <div class="progress-badge">Přiřazeno: ${answeredCount} / ${totalCount}</div>
          <div class="an-list">
            ${subitems.map((si, idx) => `
              <div class="match-item">
                <div class="match-label">${idx + 1}. ${si.question}</div>
                <div class="match-opts">
                  ${Object.entries(opts).map(([key]) => {
                    const isChosen = myMatchAnswers[si.id] === key
                    return `<button class="match-opt-btn ${isChosen ? 'selected' : ''}"
                      style="background:${OPTION_COLORS[key] || '#555'}"
                      onclick="selectMatchAnswer('${si.id}', '${key}')">${key}</button>`
                  }).join('')}
                </div>
              </div>
            `).join('')}
          </div>
          <button class="submit-btn" onclick="submitMatchAnswer()" ${!allDone ? 'disabled' : ''}>
            ${allDone ? '✅ Odeslat přiřazení' : '⏳ Přiřaďte všechny položky'}
          </button>
        </div>
      `
    } else if (qType === 'an') {
      // AN question
      const subitems = gameState.question.subitems || []
      const totalCount = subitems.length
      const answeredCount = subitems.filter(si => myAnAnswers[si.id]).length
      const allDone = answeredCount === totalCount

      content = `
        <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
        <div class="an-wrapper">
          <div class="progress-badge">Zodpovězeno: ${answeredCount} / ${totalCount}</div>
          <div class="an-list">
            ${subitems.map((si, idx) => {
              const chosen = myAnAnswers[si.id]
              return `
                <div class="an-item">
                  <div class="an-question">${idx + 1}. ${si.question}</div>
                  <div class="an-btns">
                    <button class="an-btn ${chosen === 'A' ? 'sel-yes' : ''}" onclick="selectAnAnswer('${si.id}', 'A')">✅ ANO</button>
                    <button class="an-btn ${chosen === 'N' ? 'sel-no'  : ''}" onclick="selectAnAnswer('${si.id}', 'N')">❌ NE</button>
                  </div>
                </div>
              `
            }).join('')}
          </div>
          <button class="submit-btn" onclick="submitAnAnswer()" ${!allDone ? 'disabled' : ''}>
            ${allDone ? '✅ Odeslat odpovědi' : '⏳ Zodpovězte všechna tvrzení'}
          </button>
        </div>
      `
    } else {
      // MC question
      const opts = gameState.question.options || {}
      content = `
        <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
        <div class="subtitle" style="font-size:1rem;color:#f5c518;font-weight:700">Vyber odpověď!</div>
        <div class="answer-grid">
          ${Object.entries(opts).map(([key, val]) => `
            <button class="answer-btn" style="background:${OPTION_COLORS[key] || '#555'}" onclick="submitMcAnswer('${key}')">
              <span style="font-size:1.8rem;margin-right:6px">${key}</span>
              <span style="font-size:1rem;font-weight:700">${val}</span>
            </button>
          `).join('')}
        </div>
      `
    }

  } else if (effectiveAnswer) {
    // Already answered — show confirmation
    const isObjAnswer = typeof effectiveAnswer === 'object' && effectiveAnswer !== null
    let answerDisplay = ''
    if (isObjAnswer && gameState.question?.subitems) {
      if (qType === 'match') {
        // match: show subitem → option badge pairs
        answerDisplay = `<div style="margin-top:12px;display:flex;flex-direction:column;gap:5px;align-items:flex-start;padding:0 8px">
          ${gameState.question.subitems.map((si, idx) => {
            const opt = effectiveAnswer[si.id]
            return `<div style="display:flex;align-items:center;gap:8px;font-size:0.88rem">
              <span style="color:#8899aa">${idx + 1}.</span>
              <span style="color:#d0dae8;font-weight:600;flex:1">${si.question}</span>
              <span style="background:${OPTION_COLORS[opt]||'#555'};color:#fff;border-radius:6px;padding:2px 10px;font-weight:900">${opt}</span>
            </div>`
          }).join('')}
        </div>`
      } else {
        // AN: show ANO/NE badges
        answerDisplay = `<div style="margin-top:12px;display:flex;gap:6px;justify-content:center;flex-wrap:wrap">
          ${gameState.question.subitems.map((si, idx) => `
            <div style="background:#1e2d45;border-radius:8px;padding:4px 10px;font-size:0.9rem;font-weight:800;color:${effectiveAnswer[si.id] === 'A' ? '#27ae60' : '#e74c3c'}">
              ${idx + 1}. ${effectiveAnswer[si.id] === 'A' ? 'ANO' : 'NE'}
            </div>
          `).join('')}
        </div>`
      }
    } else {
      answerDisplay = `<div style="margin-top:10px;font-size:2rem;font-weight:900;color:${OPTION_COLORS[effectiveAnswer] || '#fff'}">${effectiveAnswer}</div>`
    }
    content = `
      <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
      <div class="status-card">
        <div class="status-icon">✅</div>
        <div class="status-text">Odesláno!</div>
        ${answerDisplay}
        <div class="status-sub" style="margin-top:14px">Čekáme na ostatní...</div>
      </div>
    `
  } else {
    content = `
      <div class="player-badge">${myProfile.emoji} ${myProfile.name}</div>
      <div class="status-card">
        <div class="status-icon">⏳</div>
        <div class="status-text">Čekáme na otázku...</div>
        <div class="status-sub">Připravte se!</div>
      </div>
      <button class="change-btn" onclick="myProfile=null;render()">Změnit hráče</button>
    `
  }

  app.innerHTML = content
}

render()
</script>
</body>
</html>
